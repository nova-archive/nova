version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "queries"
    gen:
      go:
        package: "gen"
        out: "gen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: false
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
