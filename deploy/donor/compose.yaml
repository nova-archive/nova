# Donor deployment — NOT a profile in the operator compose (different actor,
# trust, secrets, ports, storage). No published ports: all federation traffic
# is mTLS over the Nebula overlay. M1 stands up the shape; live federation is M2+.
name: nova-donor

services:
  nebula:
    # Nebula runs as a SIDECAR so nova-node needs no NET_ADMIN. Pin a digest in
    # production (see docs/quickstart/donor.md). Config/cert wiring + a real
    # readiness check land in M2 — no healthcheck here yet (the image's probe
    # command and config are not established until then; gating nova-node on a
    # failing probe would wedge it).
    image: nebulaoss/nebula:latest
    cap_add: ["NET_ADMIN"]
    devices: ["/dev/net/tun:/dev/net/tun"]
    volumes:
      - ./nebula:/etc/nebula:ro
    restart: unless-stopped

  kubo:
    # Hardened Kubo sidecar holding the replica-ciphertext blockstore (P2-M4).
    # The donor pins through this over the loopback API (node.yaml kubo_api_addr:
    # http://127.0.0.1:5001) — nova-node never embeds Kubo. Shares the Nebula
    # network namespace so the API is reachable on 127.0.0.1 and is NOT published.
    # MUST be hardened per docs/specs/KUBO_HARDENING.md: private swarm key
    # (Routing=none / no public DHT / no public bootstrap), API/Gateway bound to
    # loopback only. Pin a digest in production.
    image: ipfs/kubo:latest
    network_mode: "service:nebula"
    depends_on:
      - nebula
    environment:
      - IPFS_SWARM_KEY_FILE=/run/secrets/ipfs_swarm_key
    volumes:
      - ./secrets:/run/secrets:ro
      - kubo-data:/data/ipfs
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  nova-node:
    build:
      context: ../..
      dockerfile: docker/node.Dockerfile
    image: nova-node:dev
    # Share the Nebula network namespace so the donor binds the overlay address
    # AND reaches the Kubo sidecar on loopback (kubo_api_addr).
    network_mode: "service:nebula"
    # Start-order only (no health gate yet — see the nebula service note). M2
    # adds a real Nebula readiness condition.
    depends_on:
      - nebula
      - kubo
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]
    volumes:
      - ./node.yaml:/etc/nova/node.yaml:ro
      # Federation CA cert + node cert (non-secret) mounted read-only.
      # Private key lives in ./secrets (see federation_key_path in node.yaml).
      - ./federation:/etc/nova/federation:ro
      - ./secrets:/run/secrets:ro
      - node-data:/var/lib/nova-node/data
    restart: unless-stopped
    # HEALTHCHECK is defined in the image (nova-node --healthcheck).

volumes:
  node-data:
  kubo-data:
