name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev libheif-dev libjxl-dev

      - name: Go vet
        run: go vet ./...

      - name: sqlc codegen drift
        run: make codegen-check

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        run: make test-integration
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev libheif-dev libjxl-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  web-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Type-check (admin SPA)
        run: make admin-lint

      - name: Unit tests (admin SPA)
        run: make admin-test

      - name: Build (admin SPA)
        run: make admin-build

      - name: Hermetic bundle audit
        run: make hermetic-spa

      - name: Type-check (widget)
        run: make widget-lint

      - name: Unit tests (widget)
        run: make widget-test

      - name: Build (widget)
        run: make widget-build

      - name: Hermetic widget bundle audit
        run: make hermetic-widget

      - name: Type-check (setup wizard)
        run: make setup-lint

      - name: Unit tests (setup wizard)
        run: make setup-test

      - name: Build (setup wizard)
        run: make setup-build

      - name: Hermetic setup bundle audit
        run: make hermetic-setup

  migrations-frozen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shipped migrations are immutable
        run: make migrations-frozen

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        run: make docker-build

  # Full-stack e2e against the shipped compose artifact: image build →
  # headless setup → prod profile → upload/read/transform/delete via nginx.
  # On failure smoke.sh itself dumps the last 50 compose log lines to stderr
  # (the EXIT trap tears the stack down, so a post-failure log step would
  # capture nothing). ubuntu-latest ships docker + compose v2 natively.
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: End-to-end smoke (compose prod stack)
        run: make smoke

  donor-deps-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: cmd/node dependency boundary
        run: make node-deps-check

  donor-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build donor image (no push)
        run: make node-image
      - name: Forbidden-inventory scan
        run: make node-image-inventory
      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          image: nova-node:dev
          format: spdx-json
          output-file: nova-node.sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: nova-node-sbom
          path: nova-node.sbom.spdx.json

  # Pushes the donor image BY DIGEST to GHCR and signs that digest with cosign
  # keyless/OIDC. Trusted ref only: never on pull requests (untrusted refs must
  # not mint signatures). The local-only workflow never pushes, so this is
  # exercised the first time CI runs on main.
  donor-sbom-sign:
    runs-on: ubuntu-latest
    needs: donor-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push donor image by digest
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/node.Dockerfile
          push: true
          tags: ghcr.io/nova-archive/nova-node:sha-${{ github.sha }}
      - uses: sigstore/cosign-installer@v3
      - name: Sign the image digest (keyless)
        run: cosign sign --yes ghcr.io/nova-archive/nova-node@${{ steps.push.outputs.digest }}
      - name: Attest provenance to the digest
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/nova-archive/nova-node
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      # The SBOM must describe the EXACT signed digest, not the local :dev image
      # donor-build scanned. Generate + cosign-attest it against the digest so
      # "signed image + SBOM for that digest" is actually true.
      - uses: anchore/sbom-action/download-syft@v0
      - name: SBOM for the pushed digest + attest
        run: |
          DIGEST_REF=ghcr.io/nova-archive/nova-node@${{ steps.push.outputs.digest }}
          syft "$DIGEST_REF" -o spdx-json=nova-node.sbom.spdx.json
          cosign attest --yes --type spdxjson \
            --predicate nova-node.sbom.spdx.json "$DIGEST_REF"

  # Go vulnerability reachability analysis. Complements the manual Dependabot
  # triage (CONTRIBUTING.md "Toolchain currency") with call-graph reachability:
  # only vulns that are actually reachable from Nova's code fail the build.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev libheif-dev libjxl-dev
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Coordinator release image: build + push BY DIGEST to GHCR, cosign keyless
  # sign, provenance + SBOM attestation. Mirrors donor-sbom-sign so the operator
  # image has the same supply-chain guarantees as the donor image. Trusted ref
  # only: never on pull requests.
  coordinator-sbom-sign:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push coordinator image by digest
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/coordinator.Dockerfile
          push: true
          tags: ghcr.io/nova-archive/nova-coordinator:sha-${{ github.sha }}
      - uses: sigstore/cosign-installer@v3
      - name: Sign the image digest (keyless)
        run: cosign sign --yes ghcr.io/nova-archive/nova-coordinator@${{ steps.push.outputs.digest }}
      - name: Attest provenance to the digest
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/nova-archive/nova-coordinator
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - uses: anchore/sbom-action/download-syft@v0
      - name: SBOM for the pushed digest + attest
        run: |
          DIGEST_REF=ghcr.io/nova-archive/nova-coordinator@${{ steps.push.outputs.digest }}
          syft "$DIGEST_REF" -o spdx-json=nova-coordinator.sbom.spdx.json
          cosign attest --yes --type spdxjson \
            --predicate nova-coordinator.sbom.spdx.json "$DIGEST_REF"
