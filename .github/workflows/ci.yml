name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev libheif-dev libjxl-dev

      - name: Go vet
        run: go vet ./...

      - name: sqlc codegen drift
        run: make codegen-check

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        run: make test-integration
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev libheif-dev libjxl-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  web-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Type-check (admin SPA)
        run: make admin-lint

      - name: Unit tests (admin SPA)
        run: make admin-test

      - name: Build (admin SPA)
        run: make admin-build

      - name: Hermetic bundle audit
        run: make hermetic-spa

      - name: Type-check (widget)
        run: make widget-lint

      - name: Unit tests (widget)
        run: make widget-test

      - name: Build (widget)
        run: make widget-build

      - name: Hermetic widget bundle audit
        run: make hermetic-widget

      - name: Type-check (setup wizard)
        run: make setup-lint

      - name: Unit tests (setup wizard)
        run: make setup-test

      - name: Build (setup wizard)
        run: make setup-build

      - name: Hermetic setup bundle audit
        run: make hermetic-setup

  migrations-frozen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shipped migrations are immutable
        run: make migrations-frozen

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        run: make docker-build
