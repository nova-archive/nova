openapi: 3.1.0

info:
  title: Nova HTTP API
  version: 0.0.1-phase0
  summary: Federated content-addressed blob storage with image transforms.
  description: |
    The public-facing HTTP API surface of a Nova deployment.

    This document is the source of truth for handler codegen
    (`oapi-codegen` for Go), the drag-and-drop upload widget
    (`openapi-typescript` for the TS client), and downstream language
    SDKs. CI fails the build if handler signatures and this document
    drift. See `docs/specs/PRODUCT_MODULE_INTERFACE.md` for how product
    layers like `nova-image` plug into the storage core's URL surface.

    Two distinct namespaces:

      - **Content** routes (`/blob/{cid}`, `/i/{cid}/...`) are
        unversioned, immutable, and aggressively CDN-cacheable. They
        serve bytes; they do not change.
      - **Management** routes (`/api/v1/...`) are versioned and require
        authentication unless the operator runs in `auth: anonymous`
        mode. Breaking changes go through a major version bump.

    Federation routes (`/fed/v1/...`) are reachable only over the
    operator's mesh VPN and use mutual TLS via Nebula certificates.
    They are documented separately in
    `docs/specs/FEDERATION_PROTOCOL.md`; they do not appear here
    because no public consumer should reach them.
  license:
    name: Apache-2.0
    identifier: Apache-2.0

servers:
  - url: https://{host}
    description: An operator's public Nova endpoint.
    variables:
      host:
        default: img.example.com

security:
  - {}                # default: public read for content routes
  - signedUrl: []     # private content via HMAC-signed URLs
  - bearerAuth: []    # management endpoints

tags:
  - name: content-blob
    description: Generic blob content routes (`nova-storage`).
  - name: content-image
    description: Image content with on-the-fly transforms (`nova-image`).
  - name: upload
    description: |
      Resumable (tus.io) and multipart upload endpoints. The M12 browser widget
      (`web/widget/`) is the reference consumer of this surface; after the final
      tus `PATCH`, it calls `POST .../finalize`. When `NOVA_WIDGET_DIST_DIR` is set
      the coordinator also serves the widget bundle as static assets at `/widget/*`
      (a non-API surface, not described here).
  - name: metadata
    description: Read and update blob/image metadata.
  - name: collections
    description: Curated collections of blobs and images.
  - name: search
    description: Search APIs (perceptual near-duplicate, etc.).
  - name: admin
    description: Operator and moderator endpoints (require role).
  - name: legal
    description: Public DMCA receipt and DSAR endpoints.
  - name: health
    description: Liveness probe.

paths:

  # =========================================================================
  # Health
  # =========================================================================

  /health:
    get:
      tags: [health]
      operationId: getHealth
      summary: Liveness probe.
      description: Always returns 200 if the coordinator is accepting traffic.
      security: []
      responses:
        '200':
          description: Healthy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  # =========================================================================
  # Generic blob content
  # =========================================================================

  /blob/{cid}:
    parameters:
      - $ref: '#/components/parameters/CidParam'
    get:
      tags: [content-blob]
      operationId: getBlob
      summary: Retrieve the bytes of a blob by CID.
      description: |
        Returns the bytes verbatim with the stored `Content-Type`. For
        encrypted collections the bytes are plaintext (the gateway
        decrypts on the way out). For collections the operator marked
        `public_archival: true`, the bytes are stored unencrypted and
        the gateway streams them directly.

        **Cache-Control varies by collection visibility and blob state**
        (v2 stratified policy):

        | collection | state | request | Cache-Control |
        |---|---|---|---|
        | public | active | anonymous | `public, max-age=31536000, immutable` |
        | public-archival | active | anonymous | `public, max-age=31536000, immutable` |
        | unlisted | active | anonymous (CID is the capability) | `private, max-age=300, must-revalidate` |
        | private | active | signed URL / bearer | `private, max-age=300, must-revalidate` |
        | any | soft_deleted/quarantined/tombstoned | any | `no-store` |

        **Range requests are supported only on public-archival
        (plaintext) blobs.** A Range request against an encrypted
        blob returns `416 Range Not Satisfiable`. Streaming AEAD
        is a Phase 2 deliverable; until then, single-shot decryption
        cannot serve byte ranges.
      parameters:
        - $ref: '#/components/parameters/RangeHeader'
      responses:
        '200':
          $ref: '#/components/responses/BlobBytes'
        '206':
          $ref: '#/components/responses/PartialBlobBytes'
        '401':
          $ref: '#/components/responses/SignedUrlRequired'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/Tombstoned'
        '416':
          $ref: '#/components/responses/RangeNotSatisfiable'
        '451':
          $ref: '#/components/responses/Quarantined'
    head:
      tags: [content-blob]
      operationId: headBlob
      summary: Probe a blob's existence and metadata via headers.
      responses:
        '200':
          description: Blob exists; metadata returned in headers.
          headers:
            Content-Type: { schema: { type: string } }
            Content-Length: { schema: { type: integer, format: int64 } }
            ETag: { schema: { type: string } }
            X-Nova-Cid: { schema: { type: string } }
        '404': { $ref: '#/components/responses/NotFound' }
        '410': { $ref: '#/components/responses/Tombstoned' }

  /blob/{cid}.json:
    parameters:
      - $ref: '#/components/parameters/CidParam'
    get:
      tags: [content-blob, metadata]
      operationId: getBlobJson
      summary: Public JSON metadata for a blob.
      responses:
        '200':
          description: Blob metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Blob' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410': { $ref: '#/components/responses/Tombstoned' }

  # =========================================================================
  # Image content (nova-image product layer)
  # =========================================================================

  /i/{cid}:
    parameters:
      - $ref: '#/components/parameters/CidParam'
    get:
      tags: [content-image]
      operationId: getImageOriginal
      summary: Retrieve an image at its original format.
      description: |
        Equivalent to `/blob/{cid}` but rejects with `415` if the
        underlying blob is not an image. Same caching headers.
      responses:
        '200': { $ref: '#/components/responses/ImageBytes' }
        '401': { $ref: '#/components/responses/SignedUrlRequired' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410': { $ref: '#/components/responses/Tombstoned' }
        '415':
          description: The blob exists but is not an image.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '451': { $ref: '#/components/responses/Quarantined' }
    head:
      tags: [content-image]
      operationId: headImage
      summary: Probe an image's existence and metadata via headers.
      responses:
        '200':
          description: Image exists.
          headers:
            Content-Type: { schema: { type: string } }
            Content-Length: { schema: { type: integer, format: int64 } }
            X-Nova-Width: { schema: { type: integer } }
            X-Nova-Height: { schema: { type: integer } }
        '404': { $ref: '#/components/responses/NotFound' }

  /i/{cid}.{ext}:
    parameters:
      - $ref: '#/components/parameters/CidParam'
      - name: ext
        in: path
        required: true
        description: Output format file extension. The gateway re-encodes if necessary. avif and jxl are operator-gated (off by default).
        schema:
          type: string
          enum: [jpg, jpeg, png, webp, avif, gif, jxl]
    get:
      tags: [content-image]
      operationId: getImageAsFormat
      summary: Retrieve the image, transcoded if necessary.
      responses:
        '200': { $ref: '#/components/responses/ImageBytes' }
        '404': { $ref: '#/components/responses/NotFound' }
        '406':
          description: Requested output format is not enabled by the operator.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '410': { $ref: '#/components/responses/Tombstoned' }

  /i/{cid}/{w}x{h}.{ext}:
    parameters:
      - $ref: '#/components/parameters/CidParam'
      - name: w
        in: path
        required: true
        description: Target width in pixels (1..8192).
        schema: { type: integer, minimum: 1, maximum: 8192 }
      - name: h
        in: path
        required: true
        description: Target height in pixels (1..8192).
        schema: { type: integer, minimum: 1, maximum: 8192 }
      - name: ext
        in: path
        required: true
        description: Output format file extension. avif and jxl are operator-gated (off by default).
        schema:
          type: string
          enum: [jpg, jpeg, png, webp, avif, jxl]
    get:
      tags: [content-image]
      operationId: getImageResizedBox
      summary: Retrieve the image resized to fit a `w x h` box (cover crop).
      responses:
        '200': { $ref: '#/components/responses/ImageBytes' }
        '400':
          description: Requested dimension is not in the operator whitelist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '406':
          description: Requested output format is not enabled by the operator.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /i/{cid}/w{w}.{ext}:
    parameters:
      - $ref: '#/components/parameters/CidParam'
      - name: w
        in: path
        required: true
        description: Target width in pixels (height computed to preserve aspect).
        schema: { type: integer, minimum: 1, maximum: 8192 }
      - name: ext
        in: path
        required: true
        description: Output format file extension. avif and jxl are operator-gated (off by default).
        schema:
          type: string
          enum: [jpg, jpeg, png, webp, avif, jxl]
    get:
      tags: [content-image]
      operationId: getImageResizedWidth
      summary: Retrieve the image resized to a target width, aspect preserved.
      responses:
        '200': { $ref: '#/components/responses/ImageBytes' }
        '400':
          description: Requested dimension is not in the operator whitelist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '406':
          description: Requested output format is not enabled by the operator.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /i/{cid}/p/{preset}.{ext}:
    parameters:
      - $ref: '#/components/parameters/CidParam'
      - name: preset
        in: path
        required: true
        description: Operator-defined preset name (e.g., `thumb`, `og`, `hero`).
        schema: { type: string, pattern: '^[a-z][a-z0-9_-]{0,31}$' }
      - name: ext
        in: path
        required: true
        description: Output format file extension. avif and jxl are operator-gated (off by default).
        schema:
          type: string
          enum: [jpg, jpeg, png, webp, avif, jxl]
    get:
      tags: [content-image]
      operationId: getImagePreset
      summary: Retrieve the image rendered through a named operator preset.
      responses:
        '200': { $ref: '#/components/responses/ImageBytes' }
        '404':
          description: Either the CID does not exist or the preset is unknown.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '406':
          description: Requested output format is not enabled by the operator.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /i/{cid}.json:
    parameters:
      - $ref: '#/components/parameters/CidParam'
    get:
      tags: [content-image, metadata]
      operationId: getImageJson
      summary: Public JSON metadata for an image (incl. perceptual hash).
      responses:
        '200':
          description: Image metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Image' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415':
          description: Blob exists but is not an image.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # =========================================================================
  # Upload (tus.io resumable)
  # =========================================================================

  /api/v1/uploads:
    post:
      tags: [upload]
      operationId: createUpload
      summary: Create a resumable upload (tus).
      description: |
        Implements the [tus.io](https://tus.io) resumable upload
        protocol v1.0.0. The response `Location` header points at the
        upload-specific endpoint that subsequent `PATCH`, `HEAD`, and
        `DELETE` requests target.

        After the final `PATCH` completes, call `POST .../finalize` to
        commit the upload, compute the CID, and write the metadata
        row.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/offset+octet-stream:
            schema: { type: string, format: binary }
      parameters:
        - in: header
          name: Tus-Resumable
          required: true
          schema: { type: string, enum: ['1.0.0'] }
        - in: header
          name: Upload-Length
          required: true
          schema: { type: integer, format: int64, minimum: 0 }
        - in: header
          name: Upload-Metadata
          required: false
          description: |
            tus metadata field. Nova recognizes:

              - `filename` — original filename (informational)
              - `mime_type` — declared content-type (validated server-side)
              - `product` — `image`, `video`, `audio`, `archive`,
                `document`, `raw` — selects the validation pipeline.
              - `collection_id` — UUID of the destination collection.

            (v2: `expected_cid` was removed. Random-nonce envelope
            encryption means the client cannot compute the envelope
            CID, so the field had no meaningful semantics. Plaintext-
            hash dedup, if reintroduced later, will use a different
            field name to avoid confusion.)
          schema: { type: string }
      responses:
        '201':
          description: Upload created.
          headers:
            Location:
              required: true
              schema: { type: string, format: uri }
              description: The upload-specific URL for subsequent calls.
            Tus-Resumable: { schema: { type: string } }
            Upload-Offset: { schema: { type: integer, format: int64 } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413':
          description: Upload exceeds operator's `max_upload_size`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/uploads/{id}:
    parameters:
      - $ref: '#/components/parameters/UploadIdParam'
    head:
      tags: [upload]
      operationId: getUploadOffset
      summary: Probe the current offset of an in-progress upload.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Offset and metadata returned in headers.
          headers:
            Upload-Offset: { schema: { type: integer, format: int64 } }
            Upload-Length: { schema: { type: integer, format: int64 } }
            Tus-Resumable: { schema: { type: string } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [upload]
      operationId: appendUploadChunk
      summary: Append a chunk to an in-progress upload (tus PATCH).
      security: [{ bearerAuth: [] }]
      parameters:
        - in: header
          name: Upload-Offset
          required: true
          schema: { type: integer, format: int64 }
        - in: header
          name: Tus-Resumable
          required: true
          schema: { type: string, enum: ['1.0.0'] }
        - in: header
          name: Content-Type
          required: true
          schema: { type: string, enum: ['application/offset+octet-stream'] }
      requestBody:
        required: true
        content:
          application/offset+octet-stream:
            schema: { type: string, format: binary }
      responses:
        '204':
          description: Chunk accepted.
          headers:
            Upload-Offset: { schema: { type: integer, format: int64 } }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Offset mismatch.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [upload]
      operationId: abandonUpload
      summary: Abandon an in-progress upload.
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Upload deleted. }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/uploads/{id}/finalize:
    parameters:
      - $ref: '#/components/parameters/UploadIdParam'
    post:
      tags: [upload]
      operationId: finalizeUpload
      summary: Finalize an upload, compute its CID, and persist metadata.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Upload finalized.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadResult' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Upload not yet complete (offset != length).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # =========================================================================
  # Non-resumable upload fallbacks
  # =========================================================================

  /api/v1/blobs:
    post:
      tags: [upload]
      operationId: uploadBlobMultipart
      summary: Upload a generic blob via multipart/form-data.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                product:
                  type: string
                  enum: [image, video, audio, archive, document, raw]
                  default: raw
                collection_id:
                  type: string
                  format: uuid
                alt_text: { type: string }
                caption: { type: string }
      responses:
        '201':
          description: Blob created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413':
          description: Upload exceeds operator's `max_upload_size`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/images:
    post:
      tags: [upload]
      operationId: uploadImageMultipart
      summary: Upload an image with image-specific validation.
      description: |
        Identical to `POST /api/v1/blobs` with `product=image`, but
        rejects non-image MIME types early and checks the CID against
        the operator-curated CID blocklist so the caller learns
        immediately if the upload was rejected on moderation grounds.
        The blocklist is a direct indexed lookup; no perceptual scan is
        performed at upload time (Phase-3 deferral).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                collection_id:
                  type: string
                  format: uuid
                alt_text: { type: string }
                caption: { type: string }
      responses:
        '201':
          description: Image created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadResult' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '415':
          description: File MIME type is not an accepted image format.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '451':
          description: Upload rejected by the CID blocklist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # =========================================================================
  # Metadata management
  # =========================================================================

  /api/v1/blobs/{cid}:
    parameters:
      - $ref: '#/components/parameters/CidParam'
    get:
      tags: [metadata]
      operationId: getBlobMeta
      summary: Authenticated metadata read for a blob (any state; owner or operator/moderator).
      description: |
        Returns the blob row in ANY state (unlike the public read path, which
        rejects non-active states). Authorization: the blob's owner, or an
        operator/moderator. Mounted in M11 (M6-deferred).
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Blob metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Blob' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [metadata]
      operationId: updateBlobMeta
      summary: Update mutable owner-controlled fields on a blob.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BlobUpdate' }
      responses:
        '200':
          description: Blob metadata updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Blob' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [metadata]
      operationId: deleteBlob
      summary: Soft-delete a blob (initiates crypto-shred and unpin broadcast).
      description: |
        The blob row enters `state = 'soft_deleted'` for the operator's
        configured grace window, then transitions to `tombstoned`. On
        tombstone the per-blob encryption key is zeroed and an unpin
        broadcast is sent across the federation. Bytes on volunteer
        disks may persist as unrecoverable ciphertext.
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Soft-delete accepted (owner or operator). }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: The blob is not active (already soft-deleted, quarantined, or tombstoned).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/images/{cid}:
    parameters:
      - $ref: '#/components/parameters/CidParam'
    get:
      tags: [metadata]
      operationId: getImageMeta
      summary: Authenticated metadata read for an image.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Image metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Image' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [metadata]
      operationId: updateImageMeta
      summary: Update mutable owner-controlled fields on an image.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImageUpdate' }
      responses:
        '200':
          description: Image metadata updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Image' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [metadata]
      operationId: deleteImage
      summary: Soft-delete an image (alias for `DELETE /api/v1/blobs/{cid}`).
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deletion accepted. }
        '404': { $ref: '#/components/responses/NotFound' }

  # =========================================================================
  # Collections
  # =========================================================================

  /api/v1/collections:
    get:
      tags: [collections]
      operationId: listCollections
      summary: List collections owned by the caller (or public ones).
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: visibility
          in: query
          schema:
            type: string
            enum: [public, unlisted, private]
      responses:
        '200':
          description: Collection list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCollections'
    post:
      tags: [collections]
      operationId: createCollection
      summary: Create a collection.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionCreate' }
      responses:
        '201':
          description: Collection created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Collection' }

  /api/v1/collections/{id}:
    parameters:
      - $ref: '#/components/parameters/CollectionIdParam'
    get:
      tags: [collections]
      operationId: getCollection
      summary: Read a collection.
      responses:
        '200':
          description: Collection.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Collection' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [collections]
      operationId: updateCollection
      summary: Update collection metadata.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionUpdate' }
      responses:
        '200':
          description: Updated collection.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Collection' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [collections]
      operationId: deleteCollection
      summary: Delete a collection (does not delete its items).
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Collection deleted. }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/collections/{id}/items:
    parameters:
      - $ref: '#/components/parameters/CollectionIdParam'
    post:
      tags: [collections]
      operationId: addCollectionItem
      summary: Add a blob to a collection.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cid]
              properties:
                cid: { $ref: '#/components/schemas/Cid' }
                position: { type: integer }
      responses:
        '201':
          description: Item added.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CollectionItem' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/collections/{id}/items/{cid}:
    parameters:
      - $ref: '#/components/parameters/CollectionIdParam'
      - $ref: '#/components/parameters/CidParam'
    delete:
      tags: [collections]
      operationId: removeCollectionItem
      summary: Remove a blob from a collection.
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Item removed. }
        '404': { $ref: '#/components/responses/NotFound' }

  # =========================================================================
  # Users
  # =========================================================================

  # =========================================================================
  # Auth (local OIDC-shaped JWT issuer for management/bearer auth; distinct
  # from the HMAC signed-URL scheme in SIGNED_URL_FORMAT.md). In external-OIDC
  # mode (auth.issuer_url set) login/refresh/logout/jwks return 404
  # external_oidc_active; only /auth/config responds, advertising the external
  # IdP for the client to drive the authorization-code + PKCE flow.
  # =========================================================================

  /api/v1/auth/login:
    post:
      tags: [admin]
      operationId: authLogin
      summary: Exchange username + password for an access + refresh token pair (local issuer).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Token pair.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          description: Invalid credentials (generic; no user-enumeration).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: External-OIDC mode is active; the local issuer is disabled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Login concurrency/rate limit; retry after a short delay.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/auth/refresh:
    post:
      tags: [admin]
      operationId: authRefresh
      summary: Rotate a refresh token for a new pair (single-use; reuse revokes the family).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: New token pair.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          description: Refresh token invalid, expired, revoked, or reused.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: External-OIDC mode is active; the local issuer is disabled.

  /api/v1/auth/logout:
    post:
      tags: [admin]
      operationId: authLogout
      summary: Revoke a refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LogoutRequest' }
      responses:
        '204': { description: Logged out (idempotent). }
        '404':
          description: External-OIDC mode is active; the local issuer is disabled.

  /api/v1/auth/jwks.json:
    get:
      tags: [admin]
      operationId: authJWKS
      summary: JSON Web Key Set for verifying local-issuer access tokens.
      security: []
      responses:
        '200':
          description: JWKS (OKP/Ed25519 signing key).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Jwks' }
        '404':
          description: External-OIDC mode is active; the local issuer is disabled.

  /api/v1/auth/config:
    get:
      tags: [admin]
      operationId: authConfig
      summary: Unauthenticated auth-mode discovery document for clients (SPA/CLI).
      description: |
        Always present in both modes. In local mode returns `{mode: local}`.
        In external mode returns the IdP `issuer_url` (and `client_id`/`scopes`)
        so the client can initiate the OIDC authorization-code + PKCE flow itself.
      security: []
      responses:
        '200':
          description: Auth discovery document.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthConfig' }

  /api/v1/users/me:
    get:
      tags: [metadata]
      operationId: getCurrentUser
      summary: Return the authenticated user's profile.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # =========================================================================
  # Search (perceptual)
  # =========================================================================

  /api/v1/search/perceptual:
    get:
      tags: [search]
      operationId: searchPerceptual
      summary: Find images perceptually similar to a given CID.
      description: |
        Uses the in-memory BK-tree index over PDQ hashes. By default
        operator-only (deduplication tooling); operators may flip a
        config to expose to authenticated users.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: cid
          in: query
          required: true
          schema: { $ref: '#/components/schemas/Cid' }
        - name: max_distance
          in: query
          description: Maximum Hamming distance over the 256-bit hash.
          schema:
            type: integer
            minimum: 0
            maximum: 64
            default: 5
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: Near-duplicate matches.
          content:
            application/json:
              schema:
                type: object
                required: [matches]
                properties:
                  matches:
                    type: array
                    items:
                      type: object
                      required: [cid, distance]
                      properties:
                        cid: { $ref: '#/components/schemas/Cid' }
                        distance: { type: integer, minimum: 0 }

  # =========================================================================
  # Admin (operator + moderator)
  # =========================================================================

  /api/v1/admin/nodes:
    get:
      tags: [admin]
      operationId: listNodes
      summary: List federated pinning nodes.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Node list.
          content:
            application/json:
              schema:
                type: object
                required: [nodes]
                properties:
                  nodes:
                    type: array
                    items: { $ref: '#/components/schemas/Node' }

  /api/v1/admin/nodes/{id}:
    parameters:
      - $ref: '#/components/parameters/NodeIdParam'
    get:
      tags: [admin]
      operationId: getNode
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Node detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Node' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/admin/nodes/{id}/revoke:
    parameters:
      - $ref: '#/components/parameters/NodeIdParam'
    post:
      tags: [admin]
      operationId: revokeNode
      summary: Mark a node compromised; revoke its cert and re-replicate its pins.
      description: |
        The poison-pill protocol from `FEDERATION_PROTOCOL.md`.

        On revocation the coordinator (a) revokes the node's Nebula
        certificate, (b) tombstones the node's pin assignments,
        (c) emits the `federation.node_revoked` webhook, and
        (d) enqueues re-replication for any CIDs whose factor
        dropped below target.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '202':
          description: Revocation accepted; healing dispatched asynchronously.
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/admin/pins:
    get:
      tags: [admin]
      operationId: listPins
      summary: List pin assignments (filterable).
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: state
          in: query
          schema:
            type: string
            enum: [pending, acked, failed, unpinning]
        - name: node_id
          in: query
          schema: { type: string, format: uuid }
        - name: cid
          in: query
          schema: { $ref: '#/components/schemas/Cid' }
      responses:
        '200':
          description: Pin assignments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPinAssignments'

  /api/v1/admin/moderation/quarantine:
    post:
      tags: [admin]
      operationId: moderationQuarantine
      summary: Quarantine a CID (blocks reads, preserves bytes for counter-notice window).
      description: |
        Sets the blob and its derivatives to `quarantined`, inserts a
        signed-URL revocation, and schedules a tombstone after
        `tombstone_after` (default 14 days). With `legal_hold: true` the
        DEK(s) are pinned (`legal_hold = true` in `data_encryption_keys`)
        and no `scheduled_tombstone_at` is set — crypto-shred is refused
        at the DB layer until `POST /moderation/clear-legal-hold`.

        Requires `operator` or `moderator` role.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cid, reason]
              properties:
                cid: { $ref: '#/components/schemas/Cid' }
                rule:
                  type: string
                  enum: [dmca, severe_content, operator_manual]
                case_id:
                  type: string
                  format: uuid
                  nullable: true
                reason: { type: string }
                tombstone_after:
                  type: string
                  description: |
                    Duration string e.g. `"14d"` or `"336h"`. Default `14d`.
                  default: '14d'
                legal_hold:
                  type: boolean
                  default: false
      responses:
        '200':
          description: CID quarantined.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/admin/moderation/takedown:
    post:
      tags: [admin]
      operationId: moderationTakedown
      summary: Immediate tombstone + crypto-shred of a CID (local Kubo unpin after commit).
      description: |
        Bypasses the counter-notice window: tombstones and shreds the DEK
        immediately. Returns `409 legal_hold` if the DEK carries a
        legal-hold flag (use `clear-legal-hold` first). The local Kubo
        unpin is best-effort after commit; federation unpin broadcast is
        Phase 2.

        Requires `operator` or `moderator` role.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cid, reason]
              properties:
                cid: { $ref: '#/components/schemas/Cid' }
                case_id:
                  type: string
                  format: uuid
                  nullable: true
                reason: { type: string }
      responses:
        '200':
          description: CID tombstoned and DEK shredded.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Tombstone refused — DEK is under legal hold.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/moderation/clear-legal-hold:
    post:
      tags: [admin]
      operationId: moderationClearLegalHold
      summary: Clear the legal-hold flag on a CID so the next sweep tombstones it (operator-only).
      description: |
        Clears `data_encryption_keys.legal_hold` for the parent and all
        derivatives, sets `scheduled_tombstone_at = now()` on the originating
        quarantine decision, and writes an audit row. The ≈1-minute sweep
        will tombstone and shred on its next tick.

        **Operator role required** — moderators receive `403`.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cid, reason]
              properties:
                cid: { $ref: '#/components/schemas/Cid' }
                case_ref: { type: string, nullable: true }
                reason: { type: string }
      responses:
        '200':
          description: Legal hold cleared; tombstone scheduled.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/admin/moderation/restore:
    post:
      tags: [admin]
      operationId: moderationRestore
      summary: Restore a quarantined CID to active (only valid from quarantined state).
      description: |
        Sets the blob and its derivatives back to `active` and clears
        `scheduled_tombstone_at`. The `(cid, cid)` signed-URL revocation
        is **not** removed (it is indistinguishable from a manual operator
        revocation; re-mint new signed URLs after restore if needed).
        Returns `409` if the blob is not in `quarantined` state.

        Requires `operator` or `moderator` role.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cid, reason]
              properties:
                cid: { $ref: '#/components/schemas/Cid' }
                reason: { type: string }
      responses:
        '200':
          description: CID restored to active.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Blob is not in quarantined state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/moderation/counter-notice:
    post:
      tags: [admin]
      operationId: moderationCounterNotice
      summary: Record a counter-notice and clear the scheduled tombstone.
      description: |
        Clears `scheduled_tombstone_at` so the sweep will not auto-tombstone
        during the counter-notice review window. The blob remains
        `quarantined`; the operator later restores or lets a renewed schedule
        proceed to tombstone. Appends `notes` to the associated DMCA case.

        Requires `operator` or `moderator` role.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cid, notes]
              properties:
                cid: { $ref: '#/components/schemas/Cid' }
                notes: { type: string }
      responses:
        '200':
          description: Counter-notice recorded; tombstone schedule cleared.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/admin/moderation/queue:
    get:
      tags: [admin]
      operationId: listModerationQueue
      summary: List pending moderation decisions.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Moderation queue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedModerationDecisions'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/admin/moderation/blocklist:
    get:
      tags: [admin]
      operationId: listBlocklist
      summary: List operator-curated CID blocklist entries.
      description: |
        The Phase-1 blocklist is **CID-based** (operator-curated exact-CID
        deny). Perceptual-hash / visual re-upload prevention is a Phase-3
        deferral.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Blocklist entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBlocklistEntries'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [admin]
      operationId: addBlocklistEntry
      summary: Add a CID to the operator-curated blocklist.
      description: |
        Adds the exact CID to the deny registry. Enforced at both the read
        path (`storage.Resolve` → `451`) and the import/commit path
        (`storage.Put` → `451`). The Phase-1 blocklist is CID-based;
        perceptual-hash matching is Phase 3.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cid, reason]
              properties:
                cid: { $ref: '#/components/schemas/Cid' }
                reason: { type: string }
      responses:
        '201':
          description: CID added to blocklist.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/admin/moderation/blocklist/{cid}:
    parameters:
      - name: cid
        in: path
        required: true
        schema: { $ref: '#/components/schemas/Cid' }
    delete:
      tags: [admin]
      operationId: deleteBlocklistEntry
      summary: Remove a CID from the operator-curated blocklist.
      security: [{ bearerAuth: [] }]
      responses:
        '204':
          description: CID removed from blocklist.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/admin/dmca:
    get:
      tags: [admin]
      operationId: listDmcaCases
      summary: List DMCA cases.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [received, investigating, actioned, rejected]
      responses:
        '200':
          description: DMCA cases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDmcaCases'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/admin/dmca/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [admin]
      operationId: getDmcaCase
      summary: Get a single DMCA case by id.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: DMCA case detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmcaCase'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/admin/audit-log:
    get:
      tags: [admin]
      operationId: listAuditLog
      summary: List operator action audit-log entries (newest-first).
      description: |
        Paginated listing of `audit_log` rows. Optional filters:
        `action` (e.g. `dmca.quarantined`) and `target_type` (e.g. `cid`).
        The audit log is append-only and monthly-partitioned; rows are never
        deleted (recommended retention ≥ 7 years).
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: action
          in: query
          required: false
          schema: { type: string }
        - name: target_type
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Audit log entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogEntries'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/admin/blobs:
    get:
      tags: [admin]
      operationId: listAdminBlobs
      summary: List blobs operator-wide (any state), paginated and filterable.
      description: |
        The M11 admin blob-management listing. Optional filters: `state`,
        `product`, `owner_id`. The owner-facing detail view is
        `GET /api/v1/blobs/{cid}`. Requires `operator` or `moderator`.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: state
          in: query
          schema: { type: string, enum: [active, soft_deleted, quarantined, tombstoned] }
        - name: product
          in: query
          schema: { type: string, enum: [image, video, audio, archive, document, raw] }
        - name: owner_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Blob listing.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedBlobs' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/admin/jobs:
    get:
      tags: [admin]
      operationId: listAdminJobs
      summary: List background-queue jobs (read-only), paginated and filterable.
      description: |
        The M11 jobs view — stuck / failed / recent work with `last_error`.
        Optional filters: `state`, `kind`. Read-only; requeue is a deliberate
        M11 non-goal. Requires `operator` or `moderator`.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: state
          in: query
          schema: { type: string, enum: [pending, leased, completed, failed, dead] }
        - name: kind
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Job listing.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedJobs' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/admin/keys/rotate-signing:
    post:
      tags: [admin]
      operationId: rotateSigningKey
      summary: Rotate the HMAC signing key used for signed URLs.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                grace_seconds:
                  type: integer
                  description: Window during which the previous key remains valid (default 86400).
                  minimum: 0
                  default: 86400
      responses:
        '201':
          description: Key rotated; previous key remains valid until `grace_expires_at`.
          content:
            application/json:
              schema:
                type: object
                required: [kid, grace_expires_at]
                properties:
                  kid: { type: string }
                  grace_expires_at: { type: string, format: date-time }

  /api/v1/admin/keys/rotate-master:
    post:
      tags: [admin]
      operationId: rotateMasterKey
      summary: Trigger a master-key rotation (operator-only).
      description: |
        Validates that `to_version` equals the currently-active master-key label,
        marks the `from_version` as `rotating`, and starts the background worker
        that re-wraps every DEK and non-shredded signing key from the old version
        to the new one via atomic, version-guarded UPDATEs. Rotation is online;
        reads work against either version during the drain.

        **Prerequisites.** The operator must:
        1. Deploy the new key to the secret mount (e.g. `NOVA_MASTER_KEY_V2_FILE`),
           keeping the old key present.
        2. Set `NOVA_MASTER_KEY_ACTIVE=<to_version>` and restart the coordinator.
        3. Only then call this endpoint.

        `to_version` MUST equal the active label at the time of the call or the
        endpoint returns `400 to_not_active`. See
        `docs/specs/ENCRYPTION_ENVELOPE.md` § "Rotation procedure".
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateMasterRequest'
      responses:
        '202':
          description: |
            Rotation accepted. The `total_deks` and `total_signing_keys` counts are
            the initial totals (returned once here); the CLI derives progress from
            `initial − remaining` by polling `GET /api/v1/admin/keys/rotation-status`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateMasterStarted'
        '400':
          description: |
            Validation failure. `code` is one of:
            - `to_not_active`: `to_version` is not the current active label (restart required).
            - `invalid_from_version`: `from_version` is not loaded, unknown, already retired, or equals `to_version`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Another master-key version is already `rotating`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/admin/keys/rotation-status:
    get:
      tags: [admin]
      operationId: getMasterKeyRotationStatus
      summary: Get master-key rotation progress (operator-only).
      description: |
        Returns the active master-key label, the current in-progress rotation
        (if any), and a per-version summary. When idle, `in_progress` is `null`.

        The CLI (`novactl keys status`) uses this to poll until the rotation
        completes or stalls. A stalled rotation means the `from` key was
        removed before the drain finished; `/readyz` will also degrade.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current rotation status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotationStatus'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/admin/audits/integrity:
    get:
      tags: [admin]
      operationId: listIntegrityAudits
      summary: List local integrity audit results.
      description: |
        Phase 1 local-fixity audits. See
        `docs/specs/INTEGRITY_AUDIT.md`.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: result
          in: query
          schema:
            type: string
            enum: [pass, fail, skip]
        - name: audit_kind
          in: query
          schema:
            type: string
            enum:
              - envelope_decode
              - key_unwrap
              - sample_decrypt
              - kubo_pin_present
              - derivative_state_consistent
              - block_hash_valid
              - manifest_consistent
      responses:
        '200':
          description: Integrity audit log entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedIntegrityAudits'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/admin/audits/possession:
    get:
      tags: [admin]
      operationId: listPossessionAudits
      summary: List donor possession spot-check results.
      description: |
        Phase 2 donor possession audits. See
        `docs/specs/POSSESSION_AUDIT.md`.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: result
          in: query
          schema:
            type: string
            enum: [pass, fail, skip]
        - name: node_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Pin audit log entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPossessionAudits'

  /api/v1/admin/signed-urls/revoke:
    post:
      tags: [admin]
      operationId: revokeSignedUrls
      summary: Revoke signed URLs by structured (kind, value) tuple.
      description: |
        v2 revocation is structured, not prefix-based. See
        `docs/specs/SIGNED_URL_FORMAT.md` § "Revocation".
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, value]
              properties:
                kind:
                  type: string
                  enum: [cid, aud, kid, path_prefix]
                  description: |
                    Which canonical-string field this revocation matches.
                    - `cid`: every signed URL for one CID.
                    - `aud`: every signed URL bound to one origin.
                    - `kid`: every signed URL signed with one signing key
                      (equivalent to instant key shred).
                    - `path_prefix`: every signed URL whose path starts
                      with the value (e.g., `/i/bafy.../`).
                value:
                  type: string
                  description: The CID, origin, kid, or path prefix.
      responses:
        '201':
          description: Revocation recorded (idempotent on the (kind, value) pair).
          content:
            application/json:
              schema:
                type: object
                required: [kind, value, revoked_at]
                properties:
                  kind: { type: string }
                  value: { type: string }
                  revoked_at: { type: string, format: date-time }
        '400':
          description: Unknown kind (must be cid, aud, kid, or path_prefix) or empty value.

  /api/v1/admin/signed-urls/sign:
    post:
      tags: [admin]
      operationId: signSignedUrl
      summary: Mint a signed URL for a content path.
      description: |
        Server-side minting: the unwrapped HMAC signing key never leaves the
        coordinator, so signed URLs cannot be minted client-side. The URL is
        signed with the current active signing key, bound to `aud`, and valid
        for `ttl_seconds` (clamped to the configured maximum). The matching
        read endpoints (`/blob/{cid}`, `/i/{cid}/...`) verify it per
        `docs/specs/SIGNED_URL_FORMAT.md`; a failed verification returns
        `403` with a `signature_*` code.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, ttl_seconds, aud]
              properties:
                path:
                  type: string
                  description: Content path to sign (`/blob/{cid}` or `/i/{cid}/...`).
                ttl_seconds:
                  type: integer
                  minimum: 1
                  description: URL lifetime in seconds; clamped to the configured maximum.
                aud:
                  type: string
                  description: Embedding origin (`scheme://host[:port]`) the URL is bound to.
      responses:
        '201':
          description: Signed URL minted.
          content:
            application/json:
              schema:
                type: object
                required: [url, kid, exp]
                properties:
                  url: { type: string, description: The signed URL (path plus query). }
                  kid: { type: string }
                  exp: { type: integer, description: Expiry as a Unix timestamp (seconds). }
        '400':
          description: Non-content path, malformed aud, or non-positive ttl.

  # =========================================================================
  # Public legal endpoints
  # =========================================================================

  /legal/dmca:
    post:
      tags: [legal]
      operationId: submitDmcaNotice
      summary: Submit a DMCA takedown notice.
      description: |
        The receipt endpoint for DMCA Section 512 notices. Notices are
        recorded in `dmca_cases` for the operator to review; this
        endpoint does not auto-action. See `docs/legal/DMCA_PROCEDURE.md`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DmcaSubmission' }
      responses:
        '202':
          description: Notice recorded; no action taken automatically.
          content:
            application/json:
              schema:
                type: object
                required: [case_id]
                properties:
                  case_id: { type: string, format: uuid }
        '400': { $ref: '#/components/responses/BadRequest' }

  /legal/dsar:
    get:
      tags: [legal]
      operationId: getDsarInfo
      summary: Public information about how to submit a data-subject access request.
      security: []
      responses:
        '200':
          description: DSAR information.
          content:
            application/json:
              schema:
                type: object
                required: [contact, instructions]
                properties:
                  contact: { type: string, format: email }
                  instructions: { type: string }

# =========================================================================
# Components
# =========================================================================

components:

  securitySchemes:

    signedUrl:
      type: apiKey
      in: query
      name: sig
      description: |
        HMAC-SHA256 signature, base64url-encoded. Always accompanied by
        `exp`, `aud`, and `kid` query parameters. See
        `docs/specs/SIGNED_URL_FORMAT.md`.

    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT bearer token. The **Phase-1 default** is Nova's built-in local
        OIDC-shaped issuer (EdDSA/Ed25519; see `/api/v1/auth/*`). Operators may
        instead point `auth.issuer_url` at an external OIDC provider (Authelia or
        any compatible IdP), in which case the coordinator verifies external
        tokens via the IdP's JWKS and the local-issuer endpoints return 404
        `external_oidc_active`. Both verify concurrently during migration. The
        coordinator is a resource server: it validates bearer tokens but does not
        mediate the interactive login flow (the SPA/CLI drive PKCE, discovering
        the IdP via `/api/v1/auth/config`).

        Management `/api/v1/*` writes and admin routes require a bearer with a
        sufficient role; public content reads (`/blob/*`, `/i/*`) do not.

        v2 note: the original `auth: anonymous` mode for management endpoints was
        removed. It is available only in dev builds (build tag `nova_dev`) and
        only when the coordinator binds to loopback. Production builds refuse to
        start with anonymous management auth regardless of operator config.

  parameters:

    CidParam:
      name: cid
      in: path
      required: true
      schema: { $ref: '#/components/schemas/Cid' }

    UploadIdParam:
      name: id
      in: path
      required: true
      schema: { type: string }

    CollectionIdParam:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

    NodeIdParam:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

    PageParam:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }

    PerPageParam:
      name: per_page
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }

    RangeHeader:
      name: Range
      in: header
      required: false
      description: HTTP/1.1 byte range, e.g., `bytes=0-1023`.
      schema: { type: string }

  responses:

    BlobBytes:
      description: Blob bytes.
      headers:
        Content-Type: { schema: { type: string } }
        Content-Length: { schema: { type: integer, format: int64 } }
        ETag: { schema: { type: string } }
        Cache-Control:
          schema: { type: string }
          description: Always `public, max-age=31536000, immutable`.
      content:
        application/octet-stream:
          schema: { type: string, format: binary }

    PartialBlobBytes:
      description: Partial blob bytes (Range request).
      headers:
        Content-Type: { schema: { type: string } }
        Content-Length: { schema: { type: integer, format: int64 } }
        Content-Range: { schema: { type: string } }
        Cache-Control: { schema: { type: string } }
      content:
        application/octet-stream:
          schema: { type: string, format: binary }

    ImageBytes:
      description: Image bytes.
      headers:
        Content-Type: { schema: { type: string } }
        Content-Length: { schema: { type: integer, format: int64 } }
        ETag: { schema: { type: string } }
        Cache-Control: { schema: { type: string } }
      content:
        image/jpeg:
          schema: { type: string, format: binary }
        image/png:
          schema: { type: string, format: binary }
        image/webp:
          schema: { type: string, format: binary }
        image/avif:
          schema: { type: string, format: binary }

    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

    Forbidden:
      description: Authenticated but not authorized for this action.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

    Tombstoned:
      description: |
        The CID was deleted; the per-blob encryption key has been
        shredded and the gateway can no longer decrypt the bytes
        (which may still exist as ciphertext on volunteer disks).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

    Quarantined:
      description: |
        The CID is under moderation hold. Reads are suspended pending
        operator review.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

    SignedUrlRequired:
      description: |
        The blob belongs to a private collection; provide a valid
        signed URL or a bearer token for an authorized user.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

    RangeNotSatisfiable:
      description: The Range header could not be satisfied.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:

    Cid:
      type: string
      pattern: '^bafy[a-z0-9]{55,}$'
      description: |
        IPFS CID v1 in base32 multibase. When operator-level encryption
        is enabled (the default), this is the CID of the **ciphertext**
        blob, not of the plaintext.
      example: bafybeigdyrzt5sfp7udm7hu76uh7y26nf3efuylqabf3oclgtqy55fbzdi

    Health:
      type: object
      required: [status, version]
      properties:
        status: { type: string, enum: [ok] }
        version: { type: string }
        time: { type: string, format: date-time }

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable code, snake_case.
          example: not_found
        message:
          type: string
          description: Human-readable explanation.
        request_id:
          type: string
          format: uuid
        details:
          type: object
          additionalProperties: true

    RotateMasterRequest:
      type: object
      required: [from_version, to_version]
      properties:
        from_version:
          type: string
          description: |
            Label of the master-key version to rotate away from (e.g. `v1`).
            Must be loaded, not already retired, and not equal to `to_version`.
        to_version:
          type: string
          description: |
            Label of the new master-key version (e.g. `v2`). Must equal the
            current active master-key label (`NOVA_MASTER_KEY_ACTIVE`).

    RotateMasterStarted:
      type: object
      required: [from, to, total_deks, total_signing_keys, status]
      properties:
        from:
          type: string
          description: The version being rotated away from.
        to:
          type: string
          description: The version being rotated to (the current active label).
        total_deks:
          type: integer
          description: |
            Total DEK rows to be re-wrapped (initial count, returned once here).
            The CLI derives progress from `total_deks − remaining_deks` by polling
            `GET /api/v1/admin/keys/rotation-status`.
        total_signing_keys:
          type: integer
          description: |
            Total signing key rows to be re-wrapped (initial count, returned once here).
        status:
          type: string
          enum: [accepted]
          description: Rotation accepted; background worker started.

    RotationStatus:
      type: object
      required: [active, in_progress, versions]
      properties:
        active:
          type: string
          description: The current active master-key label.
        in_progress:
          description: |
            The rotation in progress, or `null` when idle. The initial totals
            (`total_deks`/`total_signing_keys`) are returned once in the 202 body;
            progress is derived from `initial − remaining`.
          nullable: true
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/RotationProgress'
        versions:
          type: array
          items:
            $ref: '#/components/schemas/MasterKeyVersionInfo'

    RotationProgress:
      type: object
      required: [from, remaining_deks, remaining_signing_keys, stalled]
      properties:
        from:
          type: string
          description: The version being drained (in `rotating` state).
        remaining_deks:
          type: integer
          description: DEK rows not yet re-wrapped.
        remaining_signing_keys:
          type: integer
          description: Signing-key rows not yet re-wrapped.
        stalled:
          type: boolean
          description: |
            True when the `from` key is no longer loaded (prematurely removed).
            `/readyz` degrades while stalled; the operator must restore the key
            and restart to resume.
        stall_reason:
          type: string
          nullable: true
          description: Human-readable reason the rotation stalled, or null if not stalled.

    MasterKeyVersionInfo:
      type: object
      required: [label, state, dek_count, signing_count]
      properties:
        label:
          type: string
          description: The version label (e.g. `v1`, `v2`).
        state:
          type: string
          enum: [active, rotating, retired]
          description: Current state of this master-key version row.
        dek_count:
          type: integer
          description: Number of DEK rows currently referencing this version.
        signing_count:
          type: integer
          description: Number of signing-key rows currently referencing this version.
        retired_at:
          type: string
          format: date-time
          nullable: true
          description: When this version was retired, or null if still active/rotating.

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }

    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string, description: EdDSA-signed JWT bearer token. }
        refresh_token: { type: string, description: Opaque single-use rotating refresh token. }
        token_type: { type: string, enum: [bearer] }
        expires_in: { type: integer, description: Access-token TTL in seconds. }
        kid: { type: string, description: Signing-key id (JWKS key selector). }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    AuthConfig:
      type: object
      required: [mode]
      properties:
        mode: { type: string, enum: [local, external] }
        issuer_url: { type: string, description: External IdP issuer (external mode only). }
        client_id: { type: string }
        scopes: { type: array, items: { type: string } }

    Jwks:
      type: object
      description: JSON Web Key Set (RFC 7517); OKP/Ed25519 signing key(s).
      properties:
        keys:
          type: array
          items:
            type: object
            additionalProperties: true

    User:
      type: object
      required: [id, email, role, created_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        role:
          type: string
          enum: [viewer, uploader, moderator, operator]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Blob:
      type: object
      required: [cid, mime_type, byte_size, uploaded_at, state, product, urls]
      properties:
        cid: { $ref: '#/components/schemas/Cid' }
        mime_type:
          type: string
          example: image/jpeg
        byte_size:
          type: integer
          format: int64
          minimum: 0
        uploaded_at: { type: string, format: date-time }
        state:
          type: string
          enum: [active, soft_deleted, quarantined, tombstoned]
        product:
          type: string
          enum: [image, video, audio, archive, document, raw]
        owner_id:
          type: string
          format: uuid
          nullable: true
        urls:
          type: object
          required: [bytes, json]
          properties:
            bytes:
              type: string
              format: uri
              description: Direct content URL (`/blob/{cid}`).
            json:
              type: string
              format: uri
              description: Public metadata URL (`/blob/{cid}.json`).

    BlobUpdate:
      type: object
      properties:
        alt_text: { type: string, nullable: true }
        caption: { type: string, nullable: true }

    Image:
      allOf:
        - $ref: '#/components/schemas/Blob'
        - type: object
          required: [width, height]
          properties:
            width: { type: integer, minimum: 1 }
            height: { type: integer, minimum: 1 }
            alt_text: { type: string, nullable: true }
            caption: { type: string, nullable: true }
            parent_cid:
              type: string
              nullable: true
              description: |
                For derivative images, the CID of the parent original
                from which this derivative was produced. NULL for
                originals.
            urls:
              type: object
              required: [original, json]
              properties:
                original:
                  type: string
                  format: uri
                json:
                  type: string
                  format: uri
                presets:
                  type: object
                  additionalProperties:
                    type: string
                    format: uri

    # NOTE: perceptual_hash is intentionally NOT exposed on the public
    # Image schema. Public exposure of perceptual hashes enables cross-
    # site correlation and reverse-lookup attacks against known datasets.
    # Operator-only endpoints (admin search, moderation) include the hash
    # via the AdminImage schema.

    ImageUpdate:
      type: object
      properties:
        alt_text: { type: string, nullable: true }
        caption: { type: string, nullable: true }

    Collection:
      type: object
      required: [id, owner_id, name, slug, visibility, created_at]
      properties:
        id: { type: string, format: uuid }
        owner_id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        visibility:
          type: string
          enum: [public, unlisted, private]
        created_at: { type: string, format: date-time }
        item_count: { type: integer, minimum: 0 }

    CollectionCreate:
      type: object
      required: [name, slug, visibility]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        slug:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]{0,63}$'
        visibility:
          type: string
          enum: [public, unlisted, private]

    CollectionUpdate:
      type: object
      properties:
        name: { type: string }
        visibility:
          type: string
          enum: [public, unlisted, private]

    CollectionItem:
      type: object
      required: [collection_id, cid, position, added_at]
      properties:
        collection_id: { type: string, format: uuid }
        cid: { $ref: '#/components/schemas/Cid' }
        position: { type: integer }
        added_at: { type: string, format: date-time }

    Node:
      type: object
      required:
        - id
        - nebula_cert_fingerprint
        - federation_cert_fingerprint
        - capacity_bytes
        - bandwidth_budget_bytes_per_day
        - status
        - reputation_score
        - joined_at
        - last_status_change_at
      properties:
        id: { type: string, format: uuid }
        nebula_cert_fingerprint: { type: string }
        federation_cert_fingerprint:
          type: string
          description: |
            The HTTP-application-layer mTLS cert fingerprint (v2).
            Distinct from `nebula_cert_fingerprint`. See
            `FEDERATION_PROTOCOL.md` § "Authentication (v2)".
        display_name: { type: string, nullable: true }
        geo_declared:
          type: string
          nullable: true
          description: Self-declared geographic hint; not verified.
        capacity_bytes: { type: integer, format: int64, minimum: 0 }
        bandwidth_budget_bytes_per_day:
          type: integer
          format: int64
          minimum: 0
        policy_filters:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [active, suspect, unreachable, evicted, revoked]
          description: |
            v2 five-state liveness model. See `FEDERATION_PROTOCOL.md`
            § "Liveness state machine (v2)" and `DATA_MODEL.sql`.
        reputation_score:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: |
            Phase 2 possession audits update this. The orchestrator
            uses it for source selection and initial placement.
        joined_at: { type: string, format: date-time }
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        last_status_change_at:
          type: string
          format: date-time
          description: When the current `status` value was entered.

    PinAssignment:
      type: object
      required: [cid, node_id, state, assigned_at]
      properties:
        cid: { $ref: '#/components/schemas/Cid' }
        node_id: { type: string, format: uuid }
        state:
          type: string
          enum: [pending, acked, failed, unpinning]
        assigned_at: { type: string, format: date-time }
        acked_at:
          type: string
          format: date-time
          nullable: true

    ModerationDecision:
      type: object
      required: [id, cid, rule, action, decided_at, legal_hold]
      properties:
        id: { type: string, format: uuid }
        cid: { $ref: '#/components/schemas/Cid' }
        rule:
          type: string
          enum: [pdq_match, dmca, severe_content, operator_manual, user_report]
          description: |
            v2 adds `severe_content` for CSAM-class material handled
            under the legal-hold preservation flow. See
            `SEVERE_CONTENT_PROCEDURE.md`.
        rule_ref: { type: string, nullable: true }
        action:
          type: string
          enum: [quarantine, tombstone, allow]
        decided_by:
          type: string
          format: uuid
          nullable: true
        decided_at: { type: string, format: date-time }
        scheduled_tombstone_at:
          type: string
          format: date-time
          nullable: true
          description: |
            v2 quarantine-first DMCA: when set and `legal_hold` is
            false, the scheduled-tombstone job transitions the blob
            to `tombstoned` at this time. NULL for severe-content
            rows, which require manual legal-hold clearance via
            `novactl moderation clear-legal-hold`.
        legal_hold:
          type: boolean
          description: |
            v2: when true, the linked `data_encryption_keys` row's
            crypto-shred procedure refuses to run. Set automatically
            by severe-content quarantines; cleared by the operator
            after the statutory preservation window via
            `novactl moderation clear-legal-hold`. See
            `SEVERE_CONTENT_PROCEDURE.md`.
        notes: { type: string, nullable: true }

    DmcaSubmission:
      type: object
      required:
        - claimant_name
        - claimant_email
        - sworn_statement
        - target_cid
      properties:
        claimant_name: { type: string }
        claimant_email: { type: string, format: email }
        sworn_statement:
          type: string
          description: |
            The good-faith statement required by 17 U.S.C. § 512(c)(3),
            including identification of the work, the location of the
            allegedly infringing material, and the claimant's
            authorization.
        target_cid: { $ref: '#/components/schemas/Cid' }

    DmcaCase:
      type: object
      required: [id, claimant_name, claimant_email, target_cid, received_at, status]
      properties:
        id: { type: string, format: uuid }
        claimant_name: { type: string }
        claimant_email: { type: string, format: email }
        target_cid: { $ref: '#/components/schemas/Cid' }
        received_at: { type: string, format: date-time }
        actioned_at: { type: string, format: date-time, nullable: true }
        status:
          type: string
          enum: [received, investigating, actioned, rejected]

    UploadResult:
      type: object
      required: [cid, byte_size, mime_type, urls]
      properties:
        cid: { $ref: '#/components/schemas/Cid' }
        byte_size: { type: integer, format: int64 }
        mime_type: { type: string }
        product:
          type: string
          enum: [image, video, audio, archive, document, raw]
        urls:
          type: object
          required: [original, json]
          properties:
            original: { type: string, format: uri }
            json: { type: string, format: uri }
            presets:
              type: object
              additionalProperties: { type: string, format: uri }

    IntegrityAudit:
      type: object
      required: [id, cid, audit_kind, result, audited_at]
      description: |
        One row from the `integrity_audits` table. See
        `docs/specs/INTEGRITY_AUDIT.md`.
      properties:
        id: { type: integer, format: int64 }
        cid: { $ref: '#/components/schemas/Cid' }
        audit_kind:
          type: string
          enum:
            - envelope_decode
            - key_unwrap
            - sample_decrypt
            - kubo_pin_present
            - derivative_state_consistent
            - block_hash_valid
            - manifest_consistent
        result:
          type: string
          enum: [pass, fail, skip]
        error: { type: string, nullable: true }
        audited_at: { type: string, format: date-time }

    PossessionAudit:
      type: object
      required: [id, blob_cid, node_id, challenge_kind, challenged_at]
      description: |
        Phase 2: one row from the `pin_audits` table. See
        `docs/specs/POSSESSION_AUDIT.md`.
      properties:
        id: { type: string, format: uuid }
        blob_cid: { $ref: '#/components/schemas/Cid' }
        node_id: { type: string, format: uuid }
        challenge_kind:
          type: string
          enum: [block_hash, envelope_round_trip]
        nonce: { type: string }
        deadline: { type: string, format: date-time }
        result:
          type: string
          enum: [pass, fail, skip]
          nullable: true
        latency_ms: { type: integer, nullable: true }
        bytes_verified:
          type: integer
          format: int64
          nullable: true
        error: { type: string, nullable: true }
        challenged_at: { type: string, format: date-time }
        completed_at:
          type: string
          format: date-time
          nullable: true

    Pagination:
      type: object
      required: [page, per_page, total]
      properties:
        page: { type: integer, minimum: 1 }
        per_page: { type: integer, minimum: 1 }
        total: { type: integer, minimum: 0 }

    PaginatedIntegrityAudits:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/IntegrityAudit' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    AdminBlob:
      type: object
      description: A row in the M11 operator-wide blob listing.
      required: [cid, mime_type, byte_size, state, product, uploaded_at]
      properties:
        cid: { $ref: '#/components/schemas/Cid' }
        owner_id: { type: string, format: uuid, nullable: true }
        parent_cid: { type: string, nullable: true }
        mime_type: { type: string }
        byte_size: { type: integer, format: int64 }
        state: { type: string, enum: [active, soft_deleted, quarantined, tombstoned] }
        product: { type: string, enum: [image, video, audio, archive, document, raw] }
        uploaded_at: { type: string, format: date-time }

    PaginatedBlobs:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AdminBlob' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    Job:
      type: object
      description: A background-queue job row for the M11 jobs view.
      required: [id, kind, state, attempts, max_attempts, not_before, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string }
        state: { type: string, enum: [pending, leased, completed, failed, dead] }
        attempts: { type: integer }
        max_attempts: { type: integer }
        last_error: { type: string, nullable: true }
        not_before: { type: string, format: date-time }
        lease_until: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PaginatedJobs:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Job' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    PaginatedPossessionAudits:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/PossessionAudit' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    PaginatedCollections:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Collection' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    PaginatedPinAssignments:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/PinAssignment' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    PaginatedModerationDecisions:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ModerationDecision' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    PaginatedDmcaCases:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/DmcaCase' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    BlocklistEntry:
      type: object
      required: [cid, reason, rule, created_at]
      description: |
        One row from the `blocklist` table. The Phase-1 blocklist is
        **CID-based** (operator-curated exact-CID deny); perceptual-hash
        matching is a Phase-3 deferral.
      properties:
        cid: { $ref: '#/components/schemas/Cid' }
        reason: { type: string }
        rule:
          type: string
          enum: [pdq_match, dmca, severe_content, operator_manual, user_report]
          default: operator_manual
        added_by:
          type: string
          format: uuid
          nullable: true
        created_at: { type: string, format: date-time }

    PaginatedBlocklistEntries:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/BlocklistEntry' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    AuditLogEntry:
      type: object
      required: [id, action, target_type, target_id, at]
      description: |
        One row from the monthly-partitioned `audit_log` table. Written
        atomically with each moderation action (`WriteTx`) and best-effort
        for M7 admin actions (`Write`). Append-only; never pruned (legal
        retention ≥ 7 years recommended).
      properties:
        id: { type: integer, format: int64 }
        actor_id:
          type: string
          format: uuid
          nullable: true
          description: Operator/moderator UUID; null for system actions (the sweep).
        action:
          type: string
          description: |
            Dot-namespaced action string, e.g. `dmca.quarantined`,
            `dmca.tombstoned`, `dmca.restored`, `dmca.counter_received`,
            `severe.quarantined`, `severe.legal_hold_cleared`,
            `signing_key.rotated`, `signed_url.revoked`, `signed_url.signed`.
        target_type:
          type: string
          description: E.g. `cid`, `dmca_case`, `signing_key`.
        target_id: { type: string }
        payload:
          type: object
          additionalProperties: true
          nullable: true
          description: JSON context (case id, reason, scheduled_tombstone_at, etc). Never contains key material.
        at: { type: string, format: date-time }

    PaginatedAuditLogEntries:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AuditLogEntry' }
        pagination: { $ref: '#/components/schemas/Pagination' }
