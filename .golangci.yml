version: "2"
run:
  timeout: 5m
linters:
  # Pin the full set explicitly (default: standard would drift if a future
  # golangci-lint release changes its defaults).
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    revive:
      rules:
        - name: exported
        - name: error-return
        - name: error-naming
        - name: package-comments
  exclusions:
    # presets + paths below are `golangci-lint migrate` output reproducing
    # the v1 default exclusion behavior (issues.exclude-use-default) — the
    # gate is equivalent to the old config, not relaxed.
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
