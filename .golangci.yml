run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive

linters-settings:
  revive:
    rules:
      - name: exported
      - name: error-return
      - name: error-naming
      - name: package-comments

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
