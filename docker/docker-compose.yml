# Nova docker-compose — postgres + coordinator + nginx (setup and prod profiles).
#
# ────────────────────────────────────────────────────────────────────
# FIRST-RUN FLOW
# ────────────────────────────────────────────────────────────────────
#
#   1. Copy .env.example → .env and set POSTGRES_PASSWORD.
#
#   2. Start the setup profile (wizard only):
#        docker compose --profile setup up
#      Visit http://127.0.0.1:8444/setup/ and complete the wizard.
#      On commit the coordinator shuts down cleanly; compose restarts it.
#
#   3. Once the wizard writes .bootstrap-complete to the nova-config
#      volume, switch to normal operation:
#        docker compose --profile setup down
#        docker compose --profile prod up -d
#
# ────────────────────────────────────────────────────────────────────
# PROFILES
# ────────────────────────────────────────────────────────────────────
#
#   (no profile)   postgres + coordinator (always)
#   setup          + nginx-setup (wizard front on 127.0.0.1:8444)
#   prod           + nginx (rendered nova.conf) + certbot
#
# ────────────────────────────────────────────────────────────────────

# Pin the compose project name so volumes/networks are stable regardless of the
# directory the repo sits in. Without this, the project name derives from the
# compose file's parent dir ("docker"), so two clones (e.g. nova/ and nova-test/)
# collide on the SAME named volumes — a stale postgres-data volume then rejects
# the new password ("password authentication failed for user nova").
name: nova

services:

  postgres:
    image: postgres:16-alpine
    container_name: nova-postgres
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      # Force C locale for deterministic collation across hosts.
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # Loopback only. Operators who must expose for remote tooling
      # should adjust to a private interface; never bind to 0.0.0.0.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add:
      - CHOWN # entrypoint chown -R of PGDATA to the postgres user
      - DAC_OVERRIDE # root-phase reads/writes inside the postgres-owned PGDATA
      - FOWNER # chmod 00700 on PGDATA after it is chowned to postgres
      - SETUID # su-exec drop root -> postgres for initdb + the server
      - SETGID # supplementary-group setup for the same su-exec drop

  coordinator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nova-coordinator
    environment:
      # sslmode=disable is intentional for the shipped single-host topology:
      # coordinator↔postgres is THREAT_MODEL boundary ② (trusted colocation) —
      # the password never leaves this host's private compose bridge network.
      # If you run postgres OFF-HOST (a separate machine / managed DB), change
      # this to sslmode=require (or verify-full with a mounted CA) so the
      # credential + traffic are not exposed on the wire.
      DATABASE_URL: "postgres://nova:${POSTGRES_PASSWORD}@postgres:5432/nova?sslmode=disable"
      NOVA_CONFIG_DIR: /etc/nova
      NOVA_SECRETS_DIR: /run/secrets
      NOVA_KUBO_REPO: /var/lib/nova/kubo
      NOVA_CONFIG_FILE: /etc/nova/operator.yaml
      NOVA_MASTER_KEY_ACTIVE: v1
      IPFS_SWARM_KEY_FILE: /run/secrets/swarm.key
      NOVA_OIDC_SIGNING_KEY_FILE: /run/secrets/oidc-signing-key
      NOVA_TRUSTED_PROXIES: "127.0.0.1/32,::1/128"
      NOVA_LISTEN_ADDR: ":9000"
      # Operator-config overrides (see docker/.env). The coordinator honors
      # these (resolveOperatorConfig), but they were previously not passed into
      # the container, so setting them in .env silently did nothing. Unset ⇒
      # empty ⇒ no override (the wizard's operator.yaml answer stands).
      NOVA_PUBLIC_UPLOADS: "${NOVA_PUBLIC_UPLOADS:-}"
      NOVA_TOS_URL: "${NOVA_TOS_URL:-}"
    volumes:
      - nova-config:/etc/nova
      - nova-secrets:/run/secrets
      - nova-kubo:/var/lib/nova/kubo
      - nova-tmp:/var/tmp/nova-uploads
    depends_on:
      postgres:
        condition: service_healthy
    # restart: unless-stopped is required for the setup→normal re-exec:
    # the coordinator exits 0 after the wizard commits; the supervisor
    # restarts it in normal mode.
    restart: unless-stopped
    # /health is served on NOVA_LISTEN_ADDR (:9000) in both setup and normal
    # mode; curl is in the runtime image solely for this probe.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Rootfs is immutable; every writable path the entrypoint/coordinator
    # touches (NOVA_CONFIG_DIR, NOVA_SECRETS_DIR, NOVA_KUBO_REPO, the upload
    # tmp dir) is one of the named volumes above, which stay writable.
    read_only: true
    tmpfs:
      - /tmp # libvips / stdlib scratch space
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add:
      - CHOWN # root-phase entrypoint chown -R of the mounted volumes to nova
      - SETUID # gosu drop root -> nova for migrate + the coordinator exec
      - SETGID # supplementary-group setup for the same gosu drop
      - DAC_READ_SEARCH # restart path: chown -R must descend into dirs an earlier
      #   boot already made nova-owned 0700 (/etc/nova/tls, the Kubo keystore);
      #   with cap_drop ALL, root cannot traverse those without this read-only
      #   DAC bypass — without it every restart after first boot crash-loops.

  # ── Setup profile: first-run wizard front ──────────────────────────
  nginx-setup:
    profiles: ["setup"]
    image: nginx:1.25-alpine
    container_name: nova-nginx-setup
    volumes:
      - ./nginx/bootstrap.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8444:8444"
    depends_on:
      - coordinator
    restart: unless-stopped
    # nginx -t validates the config, not serving — accepted floor: a broken
    # mount/config flips unhealthy, an upstream outage does not.
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    read_only: true
    tmpfs:
      - /var/cache/nginx # client_body/proxy temp dirs
      - /run # nginx.pid (/var/run is a symlink to /run in alpine)
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add:
      - CHOWN # master chowns the temp/cache dirs to the worker user
      - SETUID # master drops worker processes to the nginx user
      - SETGID # supplementary-group setup for the same worker drop

  # ── Prod profile: wizard-rendered nova.conf ────────────────────────
  nginx:
    profiles: ["prod"]
    image: nginx:1.25-alpine
    container_name: nova-nginx
    # cert-watch.sh wraps nginx: it waits for the cert files the rendered
    # nova.conf points at (http-01 first boot: certbot writes a self-signed
    # placeholder within seconds), then runs nginx with a background watcher
    # that reloads it whenever certbot deploys a new certificate into the
    # shared nova-config volume (initial issuance and every renewal). It is
    # a no-op wait + idle watcher for dev-self-signed/static TLS modes.
    command: ["/bin/sh", "/cert-watch.sh"]
    volumes:
      # include-nova.conf contains a single `include /etc/nova/nova.conf;`
      # which drops the wizard-rendered config into nginx's http{} context.
      - ./nginx/include-nova.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/cert-watch.sh:/cert-watch.sh:ro
      # Wizard-rendered nova.conf, TLS certs, and other operator config.
      # Read-only on purpose: all TLS writes (placeholder, issued certs) are
      # done by the certbot sidecar; this public-facing container never
      # writes its own config.
      - nova-config:/etc/nova:ro
      # ACME webroot for certbot http-01 challenge issuance/renewals.
      - acme-webroot:/var/lib/certbot/webroot:ro
      # nginx content cache (populated at runtime; not a named volume so
      # a restart clears it cleanly).
    # Published per the master-plan topology: host 80/443 are deliberately
    # left free (no privileged-port grab, no clobbering an existing host web
    # server). The container listens on 80/443/8445 (the wizard-rendered
    # nova.conf); operators front 8442/8443 with DNS / an edge proxy as needed.
    ports:
      - "8442:80"
      - "8443:443"
      - "127.0.0.1:8445:8445"
    depends_on:
      - coordinator
    restart: unless-stopped
    # nginx -t validates the config, not serving — accepted floor: a broken
    # mount/config flips unhealthy, an upstream outage does not.
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    read_only: true
    tmpfs:
      - /var/cache/nginx # proxy_cache_path /var/cache/nginx/nova + temp dirs
      - /run # nginx.pid (/var/run is a symlink to /run in alpine)
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add:
      - NET_BIND_SERVICE # in-container listeners on 80/443 (<1024)
      - CHOWN # master chowns the temp/cache dirs to the worker user
      - SETUID # master drops worker processes to the nginx user
      - SETGID # supplementary-group setup for the same worker drop
      # The TLS key/cert under /etc/nova are nova-owned mode 600 (the
      # coordinator entrypoint chown -Rs the shared config volume); the nginx
      # master (root) needs read-only DAC bypass to load them, and
      # cert-watch.sh needs it to hash the cert for the reload watcher.
      - DAC_READ_SEARCH

  # ── Prod profile: Let's Encrypt issuance + renewal (http-01) ───────
  certbot:
    profiles: ["prod"]
    image: certbot/certbot
    container_name: nova-certbot
    environment:
      # Both default to the wizard's answers (server_name in the rendered
      # nova.conf / contact_email in operator.yaml); set them in docker/.env
      # only to override. See docker/.env.example.
      NOVA_HOSTNAME: "${NOVA_HOSTNAME:-}"
      NOVA_CONTACT_EMAIL: "${NOVA_CONTACT_EMAIL:-}"
    volumes:
      - ./certbot/certbot-loop.sh:/certbot-loop.sh:ro
      # Certbot deploys issued/renewed certs into the config volume at the
      # paths the rendered nova.conf points at; nginx's cert-watch.sh sees
      # the change and reloads. This volume-mediated copy is the
      # cross-container deploy hook — no signalling between containers.
      - nova-config:/etc/nova
      # ACME account + certificate lineage state. Persisted so container
      # recreation does not re-register or re-issue (LE rate limits).
      - nova-letsencrypt:/etc/letsencrypt
      # Webroot shared with nginx for the http-01 challenge.
      - acme-webroot:/var/lib/certbot/webroot
    # certbot-loop.sh (http-01 mode only; a 12-hourly no-op otherwise):
    #   1. writes a self-signed placeholder if the configured leaf is missing,
    #      breaking the bootstrap deadlock (nginx needs a cert to start;
    #      certbot needs nginx on :80 for the challenge);
    #   2. runs `certbot certonly` once if no lineage exists (initial issuance);
    #   3. runs `certbot renew` (idempotent, skips certs not yet due);
    #   4. deploys the live lineage over the nova.conf cert paths when it
    #      differs, which triggers the nginx-side reload.
    entrypoint: ["/bin/sh", "/certbot-loop.sh"]
    restart: unless-stopped
    # Process-liveness only: the loop is a best-effort sidecar (mostly asleep
    # between 12h cycles), so "the loop shell is alive" is the honest signal.
    healthcheck:
      test: ["CMD", "pgrep", "-f", "certbot-loop.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # No read_only here on purpose: certbot churns /etc/letsencrypt plus its
    # work/log dirs (/var/lib/letsencrypt, /var/log/letsencrypt) on the
    # rootfs, and the loop writes placeholder/deployed certs into /etc/nova.
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add:
      # The shared config volume is chown -Red to nova by the coordinator
      # entrypoint; the loop (root) writes placeholder + deployed certs into
      # those nova-owned dirs/files, which needs the DAC bypass.
      - DAC_OVERRIDE

volumes:
  postgres-data:
    driver: local
  nova-config:
    driver: local
  nova-secrets:
    driver: local
  nova-kubo:
    driver: local
  nova-tmp:
    driver: local
  acme-webroot:
    driver: local
  nova-letsencrypt:
    driver: local
