# Minimal M3 development proxy — NOT the Phase 1 target topology.
# A single HTTP origin that forwards the read path to the coordinator.
# TLS, dual public/admin origins, proxy_cache, per-IP limits, and config
# templating arrive in M7/M11/M13 (a wizard-rendered nova.conf replaces this).
#
# Upstream assumes a docker-compose service named `coordinator` on :9000,
# which lands in M13 alongside the Dockerfile. In M3 the integration test
# does NOT use this file — it runs an nginx testcontainer with an inline
# config pointing at the in-process coordinator via the host gateway. This
# file is shipped as the reference dev proxy and the basis for M13 templating.

server {
    listen 8080;
    server_name _;

    location = /health {
        proxy_pass http://coordinator:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-ID      $http_x_request_id;
    }

    location /blob/ {
        proxy_pass http://coordinator:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-ID      $http_x_request_id;
    }

    # M4 write path. tus PATCH streams chunked, so request buffering is off.
    location /api/v1/uploads {
        proxy_pass http://coordinator:9000;
        proxy_request_buffering off;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-ID      $http_x_request_id;
    }

    location = /api/v1/blobs {
        proxy_pass http://coordinator:9000;
        proxy_request_buffering off;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-ID      $http_x_request_id;
    }

    # M5 image read + transform routes.
    location /i/ {
        proxy_pass http://coordinator:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-ID      $http_x_request_id;
    }

    # M5 image upload edge.
    location = /api/v1/images {
        proxy_pass http://coordinator:9000;
        proxy_request_buffering off;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-ID      $http_x_request_id;
    }

    # M6 auth surface: local-issuer endpoints (login/refresh/logout/jwks) +
    # the always-on /api/v1/auth/config discovery doc. The per-IP login limiter
    # in the coordinator keys on X-Forwarded-For, set below. Dual public/admin
    # origin separation is still M11/M13; this single-origin dev proxy just
    # forwards the routes so local dev + the integration test work.
    location /api/v1/auth/ {
        proxy_pass http://coordinator:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-ID      $http_x_request_id;
    }

    # M6 authenticated whoami.
    location = /api/v1/users/me {
        proxy_pass http://coordinator:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-ID      $http_x_request_id;
    }

    # M6 admin boundary (RequireRole(operator|moderator); endpoints land M7-M10).
    location /api/v1/admin/ {
        proxy_pass http://coordinator:9000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-ID      $http_x_request_id;
    }

    # Everything else 404s at the edge for now. Remaining route families
    # (/fed/v1, /v, /a, /d, /r) are added by their milestones.
    location / {
        return 404;
    }
}
