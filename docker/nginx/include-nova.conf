# Nova production nginx entrypoint.
# This file is mounted to /etc/nginx/conf.d/default.conf in the nginx-prod
# service. It includes the wizard-rendered nova.conf (which contains
# http-context directives: limit_req_zone, map, proxy_cache_path, upstream,
# and server{} blocks) so it lands correctly inside nginx's http{} context.

include /etc/nova/nova.conf;
