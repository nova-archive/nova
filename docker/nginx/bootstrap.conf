# Nova bootstrap (first-run) nginx configuration.
# Used with --profile setup; exposes only the /setup wizard and /health
# on the loopback port 8444. All other paths return 404.
#
# Once the setup wizard completes, switch to --profile prod which uses the
# wizard-rendered /etc/nova/nova.conf via the nginx service.

server {
    listen 8444;
    server_name _;

    # Health probe (always open for liveness checks).
    location = /health {
        proxy_pass         http://coordinator:9000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Request-ID      $http_x_request_id;
    }

    # Setup wizard: static assets + API surface served by the coordinator.
    # All /setup/* traffic flows here during the first-run bootstrap.
    location /setup/ {
        proxy_pass         http://coordinator:9000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Request-ID      $http_x_request_id;
    }

    # Everything else is closed during bootstrap.
    location / {
        return 404;
    }
}
