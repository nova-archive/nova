# Phase 0 docker-compose.
#
# This file brings up only the database dependency. The Nova
# coordinator, the donor pinning node, the embedded IPFS daemon,
# IPFS Cluster, the Nebula mesh, nginx + certbot, and the admin SPA
# all arrive in subsequent phases.
#
# At Phase 0 you can verify:
#   - Postgres 16 starts cleanly with the canonical schema loaded
#     from docs/specs/DATA_MODEL.sql
#   - Your backup procedure works against the live database
#   - Your monitoring scrape path against the database is set up
#
# Bring it up:  POSTGRES_PASSWORD=changeme docker compose up -d
# Verify:       docker compose exec postgres pg_isready -U nova
# Tear down:    docker compose down -v   (the -v wipes the volume)

services:

  postgres:
    image: postgres:16-alpine
    container_name: nova-postgres
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in environment or .env}
      # Force the C locale for deterministic collation across hosts.
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # The canonical schema is loaded once on first boot.
      - ./docs/specs/DATA_MODEL.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      # Loopback only. Adjust to a private interface for remote tooling
      # if you must, but never expose 5432 to the public internet.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # Read-only root with explicit writable mounts. Postgres needs
    # /tmp and /run for its sockets and PID file.
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
    driver: local
